<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col">
                <h1 class="display-5">Admin Panel</h1>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h2 class="h4 mb-0 py-2">Users Management</h2>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">ID</th>
                                <th class="px-4 py-3">Name</th>
                                <th class="px-4 py-3">Role</th>
                                <th class="px-4 py-3">Status</th>
                                <th class="px-4 py-3">Directory Access</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td class="px-4 py-3 text-muted">{{ u.id }}</td>
                                <td class="px-4 py-3 fw-bold">{{ u.name }}</td>
                                <td class="px-4 py-3">
                                    {% if u.is_admin %}
                                    <span class="badge bg-primary">Admin</span>
                                    {% else %}
                                    <span class="badge bg-secondary">User</span>
                                    {% endif %}
                                </td>
                                <td class="px-4 py-3">
                                    <form style='display:inline;' method='POST'>
                                        <input type='hidden' name='action' value='toggle_authorize'>
                                        <input type='hidden' name='user_id' value='{{ u.id }}'>
                                        <div class="form-check form-switch mb-0">
                                            <input class="form-check-input" type='checkbox' role="switch" name='authorized' value='on' {{ 'checked' if u.authorized else '' }} onchange='this.form.submit()'>
                                            <label class="form-check-label">{{ 'Authorized' if u.authorized else 'Pending' }}</label>
                                        </div>
                                    </form>
                                </td>
                                <td class="px-4 py-3">
                                    <div class="d-flex flex-wrap gap-3">
                                        {% for d in top_levels %}
                                        {% set has_access = d in u_access[u.id] %}
                                        <form method='POST' class="m-0">
                                            <input type='hidden' name='action' value='toggle_access'>
                                            <input type='hidden' name='user_id' value='{{ u.id }}'>
                                            <input type='hidden' name='directory' value='{{ d }}'>
                                            <div class="form-check">
                                                <input class="form-check-input" type='checkbox' name='access_granted' value='on' id="dir_{{ u.id }}_{{ loop.index }}" {{ 'checked' if has_access else '' }} onchange='this.form.submit()'>
                                                <label class="form-check-label font-monospace" for="dir_{{ u.id }}_{{ loop.index }}">
                                                    {{ d }}
                                                </label>
                                            </div>
                                        </form>
                                        {% endfor %}
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
